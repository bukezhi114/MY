<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>快捷键管理器</title>
<style>
/* ===== CSS Custom Properties ===== */
:root {
  --bg-primary: #f0f2f5;
  --bg-secondary: #ffffff;
  --bg-sidebar: #1e1e2e;
  --bg-sidebar-hover: #2a2a3d;
  --bg-sidebar-active: #3a3a5c;
  --text-primary: #212529;
  --text-secondary: #6c757d;
  --text-sidebar: #cdd6f4;
  --text-sidebar-dim: #8b8ba7;
  --accent: #4a9eff;
  --accent-hover: #3a8eef;
  --accent-light: #e8f4fd;
  --danger: #e74c3c;
  --danger-hover: #c0392b;
  --success: #27ae60;
  --warning: #f39c12;
  --kbd-bg: #2d2d3f;
  --kbd-text: #e0e0e0;
  --kbd-border: #4a4a6a;
  --border: #e2e8f0;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
  --radius-sm: 6px;
  --radius: 8px;
  --radius-lg: 12px;
  --transition: 0.2s ease;
}

/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ===== Header ===== */
#app-header {
  height: 56px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  flex-shrink: 0;
  z-index: 100;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 18px;
  font-weight: 700;
  color: var(--text-primary);
}
.header-left .logo { font-size: 22px; }
.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ===== Buttons ===== */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-secondary);
  color: var(--text-primary);
  font-size: 13px;
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
  font-family: inherit;
}
.btn:hover { background: var(--bg-primary); border-color: #cbd5e0; }
.btn-primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
.btn-danger { color: var(--danger); }
.btn-danger:hover { background: #fdf2f2; border-color: var(--danger); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-icon {
  width: 32px; height: 32px; padding: 0;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm); border: none;
  background: transparent; color: var(--text-secondary);
  cursor: pointer; transition: all var(--transition);
}
.btn-icon:hover { background: var(--bg-primary); color: var(--text-primary); }
.btn-icon.danger:hover { background: #fdf2f2; color: var(--danger); }

/* ===== Layout ===== */
#app-container {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ===== Sidebar ===== */
#sidebar {
  width: 260px;
  background: var(--bg-sidebar);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}
.sidebar-search {
  padding: 14px;
  flex-shrink: 0;
}
.sidebar-search input {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid #3a3a5c;
  border-radius: var(--radius-sm);
  background: #16162a;
  color: var(--text-sidebar);
  font-size: 13px;
  outline: none;
  font-family: inherit;
}
.sidebar-search input::placeholder { color: var(--text-sidebar-dim); }
.sidebar-search input:focus { border-color: var(--accent); }

#app-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 8px 14px;
  list-style: none;
}
#app-list::-webkit-scrollbar { width: 4px; }
#app-list::-webkit-scrollbar-thumb { background: #3a3a5c; border-radius: 2px; }

.app-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  color: var(--text-sidebar);
  font-size: 13px;
  transition: all var(--transition);
  margin-bottom: 1px;
  user-select: none;
}
.app-item:hover { background: var(--bg-sidebar-hover); }
.app-item.active { background: var(--bg-sidebar-active); color: #fff; }
.app-item .app-icon { font-size: 18px; width: 24px; text-align: center; flex-shrink: 0; }
.app-item .app-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.app-item .app-count {
  font-size: 11px;
  color: var(--text-sidebar-dim);
  background: #2a2a3d;
  padding: 2px 7px;
  border-radius: 10px;
  flex-shrink: 0;
}
.app-item.active .app-count { background: #5a5a8a; color: #cdd6f4; }

.sidebar-footer {
  padding: 10px 14px;
  border-top: 1px solid #2a2a3d;
  flex-shrink: 0;
}
.sidebar-footer .btn {
  width: 100%;
  justify-content: center;
  background: #2a2a3d;
  color: var(--text-sidebar);
  border-color: #3a3a5c;
}
.sidebar-footer .btn:hover { background: var(--bg-sidebar-active); }

/* ===== Main Panel ===== */
#main-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg-primary);
}

.main-toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px 24px;
  flex-shrink: 0;
  flex-wrap: wrap;
}
.main-toolbar .app-title {
  font-size: 20px;
  font-weight: 700;
  flex: 1;
  min-width: 120px;
}
#category-filter {
  padding: 6px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px;
  background: var(--bg-secondary);
  cursor: pointer;
  font-family: inherit;
}
#result-count { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }

#shortcut-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 24px 24px;
}
#shortcut-list::-webkit-scrollbar { width: 6px; }
#shortcut-list::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 3px; }

/* ===== Shortcut Card ===== */
.shortcut-card {
  background: var(--bg-secondary);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 8px;
  box-shadow: var(--shadow-sm);
  display: flex;
  align-items: flex-start;
  gap: 14px;
  transition: box-shadow var(--transition);
  border: 1px solid var(--border);
}
.shortcut-card:hover { box-shadow: var(--shadow); }

.shortcut-keys {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
  align-items: center;
  flex-shrink: 0;
  min-width: 120px;
}
.shortcut-keys kbd {
  display: inline-block;
  padding: 3px 7px;
  background: var(--kbd-bg);
  color: var(--kbd-text);
  border: 1px solid var(--kbd-border);
  border-radius: 4px;
  font-family: "Cascadia Code", "Fira Code", "JetBrains Mono", "Consolas", monospace;
  font-size: 11px;
  font-weight: 500;
  white-space: nowrap;
}
.shortcut-keys .key-plus { color: var(--text-secondary); font-size: 11px; margin: 0 1px; }

.shortcut-info { flex: 1; min-width: 0; }
.shortcut-info .shortcut-desc {
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 4px;
  word-break: break-all;
}
.shortcut-info .shortcut-sub {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.shortcut-info .shortcut-desc-en {
  font-size: 12px;
  color: var(--text-secondary);
}

.shortcut-actions {
  display: flex;
  gap: 2px;
  flex-shrink: 0;
}

/* ===== Badges ===== */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 500;
  white-space: nowrap;
}
.badge-category { background: #ede9fe; color: #7c3aed; }
.badge-platform { background: #e0f2fe; color: #0369a1; }
.badge-win { background: #e0f2fe; color: #0369a1; }
.badge-mac { background: #fce7f3; color: #be185d; }
.badge-both { background: #d1fae5; color: #065f46; }

/* ===== Empty State ===== */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  color: var(--text-secondary);
  text-align: center;
}
.empty-state .empty-icon { font-size: 48px; margin-bottom: 14px; opacity: 0.6; }
.empty-state .empty-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: var(--text-primary); }
.empty-state .empty-desc { font-size: 13px; }

/* ===== Modal ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  animation: fadeIn 0.15s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--bg-secondary);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  width: 90%;
  max-width: 520px;
  max-height: 85vh;
  overflow-y: auto;
  animation: slideUp 0.2s ease;
}
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 20px;
  border-bottom: 1px solid var(--border);
}
.modal-header h2 { font-size: 16px; font-weight: 700; }
.modal-body { padding: 20px; }
.modal-footer {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  padding: 14px 20px;
  border-top: 1px solid var(--border);
}

.form-group { margin-bottom: 14px; }
.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 5px;
  color: var(--text-primary);
}
.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-family: inherit;
  outline: none;
  transition: border-color var(--transition);
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  border-color: var(--accent);
}
.form-group textarea { resize: vertical; min-height: 60px; }
.form-row { display: flex; gap: 10px; }
.form-row .form-group { flex: 1; }

/* ===== Confirm Dialog ===== */
.confirm-dialog .modal { max-width: 400px; text-align: center; }
.confirm-dialog .modal-body { padding: 30px 20px 20px; }
.confirm-dialog .confirm-icon { font-size: 40px; margin-bottom: 10px; }
.confirm-dialog .confirm-msg { font-size: 14px; line-height: 1.6; }

/* ===== Import Modal ===== */
#import-preview { max-height: 200px; overflow-y: auto; font-size: 13px; }
#import-strategy { margin-top: 14px; }
#import-strategy label {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 10px; margin-bottom: 6px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  cursor: pointer; transition: all var(--transition);
}
#import-strategy label:hover { border-color: var(--accent); background: var(--accent-light); }
#import-strategy input[type="radio"] { margin-top: 2px; }
#import-strategy .strategy-title { font-weight: 600; font-size: 13px; }
#import-strategy .strategy-desc { font-size: 12px; color: var(--text-secondary); }

/* ===== Toast ===== */
#toast-container {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 300;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  padding: 10px 18px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  color: #fff;
  box-shadow: var(--shadow-lg);
  animation: slideIn 0.3s ease;
  max-width: 360px;
}
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
.toast-success { background: var(--success); }
.toast-error { background: var(--danger); }
.toast-warning { background: var(--warning); color: #333; }

/* ===== Search Highlight ===== */
mark { background: #fef08a; color: inherit; padding: 0 2px; border-radius: 2px; }

/* ===== Section Header ===== */
.section-header {
  padding: 20px 0 8px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-sidebar-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ===== Responsive ===== */
@media (max-width: 768px) {
  #app-container { flex-direction: column; }
  #sidebar {
    width: 100%;
    max-height: 200px;
    flex-shrink: 0;
  }
  #app-list {
    display: flex;
    flex-wrap: nowrap;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 0 8px 8px;
    gap: 4px;
  }
  #app-list::-webkit-scrollbar { height: 4px; }
  .app-item {
    flex-shrink: 0;
    padding: 6px 10px;
    font-size: 12px;
    gap: 5px;
  }
  .app-item .app-count { display: none; }
  .sidebar-footer { display: none; }
  .sidebar-search { padding: 8px; }
  .sidebar-search input { font-size: 12px; padding: 6px 10px; }

  #main-panel { min-height: 0; }
  .main-toolbar { padding: 10px 14px; gap: 6px; }
  .main-toolbar .app-title { font-size: 16px; }
  #shortcut-list { padding: 0 10px 10px; }

  .shortcut-card { flex-direction: column; gap: 8px; padding: 12px; }
  .shortcut-actions { align-self: flex-end; }

  .modal { max-width: 95%; }
  .form-row { flex-direction: column; gap: 0; }
}

@media (max-width: 400px) {
  #app-header { padding: 0 10px; }
  .header-left { font-size: 14px; }
  .btn { padding: 5px 10px; font-size: 12px; }
  .shortcut-keys { min-width: auto; }
  .shortcut-keys kbd { font-size: 10px; padding: 2px 5px; }
}
</style>
</head>
<body>

<!-- ===== Header ===== -->
<header id="app-header">
  <div class="header-left">
    <span class="logo">⌨</span>
    <span>快捷键管理器</span>
  </div>
  <div class="header-right">
    <button class="btn btn-sm" onclick="importFromJSON()" title="从 JSON 文件导入快捷键">📥 导入</button>
    <button class="btn btn-sm" onclick="exportAsJSON()" title="导出快捷键到 JSON 文件">📤 导出</button>
  </div>
</header>

<!-- ===== App Container ===== -->
<div id="app-container">
  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-search">
      <input type="text" id="search-input" placeholder="🔍 搜索快捷键...">
    </div>
    <ul id="app-list"></ul>
    <div class="sidebar-footer">
      <button class="btn btn-sm" onclick="openAddAppDialog()">+ 添加应用</button>
    </div>
  </aside>

  <!-- Main Panel -->
  <main id="main-panel">
    <div class="main-toolbar">
      <span class="app-title" id="current-app-title">全部应用</span>
      <select id="category-filter">
        <option value="全部">全部类别</option>
      </select>
      <span id="result-count"></span>
      <button class="btn btn-primary btn-sm" id="btn-add-shortcut" onclick="openAddModal()">+ 添加快捷键</button>
    </div>
    <div id="shortcut-list"></div>
  </main>
</div>

<!-- ===== Add/Edit Modal ===== -->
<div class="modal-overlay" id="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">添加快捷键</h2>
      <button class="btn-icon" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label for="form-app-name">应用名称 *</label>
          <input type="text" id="form-app-name" list="app-datalist" placeholder="例如：VS Code">
          <datalist id="app-datalist"></datalist>
        </div>
        <div class="form-group">
          <label for="form-category">分类</label>
          <select id="form-category">
            <option value="编辑">编辑</option><option value="文件">文件</option>
            <option value="视图">视图</option><option value="导航">导航</option>
            <option value="选择">选择</option><option value="工具">工具</option>
            <option value="窗口">窗口</option><option value="运行/调试">运行/调试</option>
            <option value="重构">重构</option><option value="图层">图层</option>
            <option value="时间轴">时间轴</option><option value="变换">变换</option>
            <option value="渲染">渲染</option><option value="标签页">标签页</option>
            <option value="书签">书签</option><option value="场景/源">场景/源</option>
            <option value="录制/直播">录制/直播</option>
            <option value="音频">音频</option>
            <option value="格式">格式</option>
            <option value="公式">公式</option>
            <option value="演示">演示</option>
            <option value="模式">模式</option>
            <option value="对象">对象</option>
            <option value="其他">其他</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label for="form-shortcut-keys">快捷键 *</label>
        <input type="text" id="form-shortcut-keys" placeholder="例如：Ctrl+Shift+P">
      </div>
      <div class="form-group">
        <label for="form-description">功能描述 *</label>
        <input type="text" id="form-description" placeholder="例如：打开命令面板">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="form-platform">平台</label>
          <select id="form-platform">
            <option value="通用">通用</option>
            <option value="Windows">Windows</option>
            <option value="macOS">macOS</option>
          </select>
        </div>
        <div class="form-group">
          <label for="form-tags">标签（逗号分隔）</label>
          <input type="text" id="form-tags" placeholder="例如：终端, 面板">
        </div>
      </div>
      <input type="hidden" id="form-edit-id">
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="submitForm()">保存</button>
    </div>
  </div>
</div>

<!-- ===== Confirm Dialog ===== -->
<div class="modal-overlay confirm-dialog" id="confirm-dialog" style="display:none">
  <div class="modal">
    <div class="modal-body">
      <div class="confirm-icon">⚠️</div>
      <p class="confirm-msg" id="confirm-msg"></p>
    </div>
    <div class="modal-footer" style="justify-content:center; border-top:none; padding-top:0;">
      <button class="btn" onclick="closeConfirm()">取消</button>
      <button class="btn btn-danger" id="confirm-btn">删除</button>
    </div>
  </div>
</div>

<!-- ===== Import Modal ===== -->
<div class="modal-overlay" id="import-modal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h2>导入快捷键</h2>
      <button class="btn-icon" onclick="closeImportModal()">✕</button>
    </div>
    <div class="modal-body">
      <div id="import-preview"></div>
      <div id="import-strategy">
        <label>
          <input type="radio" name="import-strategy" value="replace">
          <div>
            <div class="strategy-title">替换全部</div>
            <div class="strategy-desc">清空当前数据，使用导入的数据</div>
          </div>
        </label>
        <label>
          <input type="radio" name="import-strategy" value="merge" checked>
          <div>
            <div class="strategy-title">合并</div>
            <div class="strategy-desc">保留现有数据，添加新的快捷键（跳过重复 ID）</div>
          </div>
        </label>
        <label>
          <input type="radio" name="import-strategy" value="overwrite">
          <div>
            <div class="strategy-title">覆盖更新</div>
            <div class="strategy-desc">同 ID 则覆盖更新，新的则添加</div>
          </div>
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeImportModal()">取消</button>
      <button class="btn btn-primary" id="btn-import-confirm">确认导入</button>
    </div>
  </div>
</div>

<!-- ===== Toast Container ===== -->
<div id="toast-container"></div>

<!-- Hidden file input for import -->
<input type="file" id="import-file-input" accept=".json" style="display:none" onchange="handleImportFile(event)">

<script>
/* ===== 预设快捷键数据库 ===== */
const DEFAULT_SHORTCUTS = [
  // ===== VS Code =====

/* ===== 状态管理 ===== */
const STORAGE_KEY = 'shortcut-manager-v2';
const LAST_APP_KEY = 'shortcut-last-app';

const state = {
  shortcuts: [],
  selectedApp: null,
  searchQuery: '',
  categoryFilter: '全部',
  platformFilter: '全部',
  editTarget: null,
  pendingImport: null,
};

/* ===== 持久化层 ===== */
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      if (Array.isArray(data)) return data;
    }
  } catch (e) { /* corrupted data, fall through */ }
  // First run: save defaults
  const defaults = JSON.parse(JSON.stringify(DEFAULT_SHORTCUTS));
  saveData(defaults);
  return defaults;
}

function saveData(data) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data || state.shortcuts));
  } catch (e) {
    if (e.name === 'QuotaExceededError') {
      showToast('存储空间不足，请导出数据后清理', 'error');
    }
  }
}

/* ===== 工具函数 ===== */
function debounce(fn, delay) {
  let timer;
  return function(...args) {
    clearTimeout(timer);
    timer = setTimeout(() => fn.apply(this, args), delay);
  };
}

function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function generateId() {
  return 'u-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8);
}

function getAppIcon(name) {
  const icons = {
    'VS Code': '💻', 'IntelliJ IDEA': '☕', 'Microsoft Word': '📝',
    'Microsoft Excel': '📊', 'Microsoft PowerPoint': '📽️', 'Google Chrome': '🌐',
    'Adobe Photoshop': '🎨', 'Adobe Premiere Pro': '🎬', 'Blender': '🔷',
    'OBS Studio': '📹', 'Windows 系统': '🪟', 'macOS 系统': '🍎',
  };
  return icons[name] || '📁';
}

/* ===== 过滤引擎 ===== */
function getFilteredShortcuts() {
  let results = state.shortcuts;

  if (state.selectedApp && state.selectedApp !== '全部') {
    results = results.filter(s => s.appName === state.selectedApp);
  }

  if (state.searchQuery) {
    const q = state.searchQuery.toLowerCase();
    results = results.filter(s =>
      s.appName.toLowerCase().includes(q) ||
      s.shortcutKeys.toLowerCase().includes(q) ||
      s.description.toLowerCase().includes(q) ||
      (s.tags && s.tags.some(t => t.toLowerCase().includes(q)))
    );
  }

  if (state.categoryFilter !== '全部') {
    results = results.filter(s => s.category === state.categoryFilter);
  }

  if (state.platformFilter !== '全部') {
    results = results.filter(s =>
      s.platform === '通用' || s.platform === state.platformFilter
    );
  }

  return results;
}

function getApps() {
  const map = new Map();
  state.shortcuts.forEach(s => {
    if (!map.has(s.appName)) map.set(s.appName, { count: 0, icon: getAppIcon(s.appName) });
    map.get(s.appName).count++;
  });
  const apps = Array.from(map.entries()).map(([name, info]) => ({
    name, count: info.count, icon: info.icon,
  }));
  // Pin popular apps to the top
  const pinned = ['VS Code', 'IntelliJ IDEA', 'Microsoft Word', 'Microsoft Excel', 'Google Chrome', 'Adobe Photoshop', 'Blender', 'OBS Studio'];
  const pinnedApps = pinned.filter(p => apps.find(a => a.name === p)).map(p => apps.find(a => a.name === p));
  const otherApps = apps.filter(a => !pinned.includes(a.name));
  otherApps.sort((a, b) => a.name.localeCompare(b.name, 'zh'));
  return [...pinnedApps, ...otherApps];
}

function getCategoriesForApp(appName) {
  const cats = new Set();
  const shortcuts = appName && appName !== '全部'
    ? state.shortcuts.filter(s => s.appName === appName)
    : state.shortcuts;
  shortcuts.forEach(s => cats.add(s.category));
  return ['全部', ...Array.from(cats).sort((a, b) => a.localeCompare(b, 'zh'))];
}

/* ===== 渲染 ===== */
function highlightText(text, query) {
  if (!query) return escapeHTML(text);
  const escaped = escapeHTML(text);
  const escapedQuery = escapeHTML(query);
  const re = new RegExp(`(${escapedQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return escaped.replace(re, '<mark>$1</mark>');
}

function renderShortcutKeys(keys) {
  return keys.split('+').map(k => `<kbd>${escapeHTML(k.trim())}</kbd>`).join('<span class="key-plus">+</span>');
}

function renderAppList() {
  const apps = getApps();
  const query = state.searchQuery.toLowerCase();

  // Filter apps by search if searching across all
  let filteredApps = apps;
  if (query && (!state.selectedApp || state.selectedApp === '全部')) {
    filteredApps = apps.filter(a => {
      if (a.name.toLowerCase().includes(query)) return true;
      const appShortcuts = state.shortcuts.filter(s => s.appName === a.name);
      return appShortcuts.some(s =>
        s.shortcutKeys.toLowerCase().includes(query) ||
        s.description.toLowerCase().includes(query)
      );
    });
  }

  const list = document.getElementById('app-list');
  let html = '<li class="app-item' + (!state.selectedApp ? ' active' : '') + '" data-app="全部"><span class="app-icon">📋</span><span class="app-name">全部应用</span><span class="app-count">' + state.shortcuts.length + '</span></li>';

  // Separate pinned from others
  const pinned = filteredApps.filter(a => ['VS Code', 'IntelliJ IDEA', 'Microsoft Word', 'Microsoft Excel', 'Google Chrome', 'Adobe Photoshop', 'Blender', 'OBS Studio'].includes(a.name));
  const others = filteredApps.filter(a => !['VS Code', 'IntelliJ IDEA', 'Microsoft Word', 'Microsoft Excel', 'Google Chrome', 'Adobe Photoshop', 'Blender', 'OBS Studio'].includes(a.name));

  if (pinned.length) {
    html += '<div class="section-header">常用软件</div>';
    pinned.forEach(app => {
      html += `<li class="app-item${state.selectedApp === app.name ? ' active' : ''}" data-app="${escapeHTML(app.name)}">
        <span class="app-icon">${app.icon}</span>
        <span class="app-name">${escapeHTML(app.name)}</span>
        <span class="app-count">${app.count}</span>
      </li>`;
    });
  }
  if (others.length) {
    html += '<div class="section-header">其他应用</div>';
    others.forEach(app => {
      html += `<li class="app-item${state.selectedApp === app.name ? ' active' : ''}" data-app="${escapeHTML(app.name)}">
        <span class="app-icon">${app.icon}</span>
        <span class="app-name">${escapeHTML(app.name)}</span>
        <span class="app-count">${app.count}</span>
      </li>`;
    });
  }
  if (filteredApps.length === 0 && !query) {
    html += '<li style="padding:20px;color:#8b8ba7;text-align:center;font-size:12px;">暂无应用</li>';
  }

  list.innerHTML = html;

  // Bind click events
  list.querySelectorAll('.app-item').forEach(item => {
    item.addEventListener('click', () => {
      state.selectedApp = item.dataset.app === '全部' ? null : item.dataset.app;
      if (state.selectedApp) {
        localStorage.setItem(LAST_APP_KEY, state.selectedApp);
      } else {
        localStorage.removeItem(LAST_APP_KEY);
      }
      state.categoryFilter = '全部';
      renderAll();
    });
  });
}

function renderShortcutList() {
  const shortcuts = getFilteredShortcuts();
  const container = document.getElementById('shortcut-list');
  const countEl = document.getElementById('result-count');

  // Update toolbar
  const titleEl = document.getElementById('current-app-title');
  titleEl.textContent = state.selectedApp ? state.selectedApp + ' 快捷键' : '全部快捷键';

  // Update category filter
  const catFilter = document.getElementById('category-filter');
  const cats = getCategoriesForApp(state.selectedApp);
  catFilter.innerHTML = cats.map(c => `<option value="${c}"${state.categoryFilter === c ? ' selected' : ''}>${c}</option>`).join('');

  countEl.textContent = `共 ${shortcuts.length} 条`;

  // Update add button behavior
  const addBtn = document.getElementById('btn-add-shortcut');
  addBtn.style.display = state.selectedApp ? '' : 'none';

  if (shortcuts.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🔍</div>
      <div class="empty-title">${state.searchQuery ? '未找到匹配的快捷键' : '暂无快捷键'}</div>
      <div class="empty-desc">${state.searchQuery ? '尝试其他搜索词' : (state.selectedApp ? '点击"+ 添加快捷键"添加' : '选择左侧应用查看快捷键')}</div>
    </div>`;
    return;
  }

  // Group by category
  const grouped = {};
  shortcuts.forEach(s => {
    if (!grouped[s.category]) grouped[s.category] = [];
    grouped[s.category].push(s);
  });

  let html = '';
  const categories = Object.keys(grouped).sort((a, b) => a.localeCompare(b, 'zh'));
  categories.forEach(cat => {
    html += `<div style="font-size:11px;font-weight:700;color:var(--text-secondary);padding:16px 0 6px;text-transform:uppercase;letter-spacing:0.5px;">${cat}</div>`;
    grouped[cat].forEach(s => {
      const q = state.searchQuery;
      html += `<div class="shortcut-card">
        <div class="shortcut-keys">${renderShortcutKeys(s.shortcutKeys)}</div>
        <div class="shortcut-info">
          <div class="shortcut-desc">${highlightText(s.description, q)}</div>
          <div class="shortcut-sub">
            <span class="badge badge-category">${escapeHTML(s.category)}</span>
            <span class="badge ${s.platform === 'Windows' ? 'badge-win' : s.platform === 'macOS' ? 'badge-mac' : 'badge-both'}">${escapeHTML(s.platform)}</span>
          </div>
        </div>
        <div class="shortcut-actions">
          <button class="btn-icon" title="编辑" onclick="openEditModal('${s.id}')">✏️</button>
          <button class="btn-icon danger" title="删除" onclick="confirmDelete('${s.id}')">🗑️</button>
        </div>
      </div>`;
    });
  });

  container.innerHTML = html;
}

function renderAll() {
  renderAppList();
  renderShortcutList();
}

/* ===== CRUD ===== */
function openAddModal(appName) {
  state.editTarget = null;
  document.getElementById('modal-title').textContent = '添加快捷键';
  document.getElementById('form-app-name').value = appName || state.selectedApp || '';
  document.getElementById('form-category').value = '编辑';
  document.getElementById('form-shortcut-keys').value = '';
  document.getElementById('form-description').value = '';
  document.getElementById('form-platform').value = '通用';
  document.getElementById('form-tags').value = '';
  document.getElementById('form-edit-id').value = '';
  updateAppDatalist();
  document.getElementById('modal-overlay').style.display = 'flex';
  document.getElementById('form-shortcut-keys').focus();
}

function openEditModal(id) {
  const s = state.shortcuts.find(sc => sc.id === id);
  if (!s) return;
  state.editTarget = s;
  document.getElementById('modal-title').textContent = '编辑快捷键';
  document.getElementById('form-app-name').value = s.appName;
  document.getElementById('form-category').value = s.category;
  document.getElementById('form-shortcut-keys').value = s.shortcutKeys;
  document.getElementById('form-description').value = s.description;
  document.getElementById('form-platform').value = s.platform;
  document.getElementById('form-tags').value = (s.tags || []).join(', ');
  document.getElementById('form-edit-id').value = s.id;
  updateAppDatalist();
  document.getElementById('modal-overlay').style.display = 'flex';
}

function updateAppDatalist() {
  const apps = getApps().map(a => a.name);
  document.getElementById('app-datalist').innerHTML = apps.map(n => `<option value="${escapeHTML(n)}">`).join('');
}

function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
}

function submitForm() {
  const appName = document.getElementById('form-app-name').value.trim();
  const shortcutKeys = document.getElementById('form-shortcut-keys').value.trim();

  if (!appName || !shortcutKeys) {
    showToast('应用名称和快捷键为必填项', 'error');
    return;
  }

  const data = {
    appName,
    category: document.getElementById('form-category').value,
    shortcutKeys,
    description: document.getElementById('form-description').value.trim(),
    platform: document.getElementById('form-platform').value,
    tags: document.getElementById('form-tags').value.split(',').map(t => t.trim()).filter(Boolean),
  };

  const editId = document.getElementById('form-edit-id').value;
  if (editId) {
    // Edit existing
    const idx = state.shortcuts.findIndex(s => s.id === editId);
    if (idx !== -1) {
      state.shortcuts[idx] = { ...state.shortcuts[idx], ...data };
    }
    showToast('快捷键已更新', 'success');
  } else {
    // Add new
    state.shortcuts.push({
      id: generateId(),
      ...data,
      isBuiltIn: false,
    });
    showToast('快捷键已添加', 'success');
  }

  // Auto-select the app
  if (!state.selectedApp || state.selectedApp !== appName) {
    state.selectedApp = appName;
    localStorage.setItem(LAST_APP_KEY, appName);
  }

  saveData();
  closeModal();
  renderAll();
}

function confirmDelete(id) {
  const s = state.shortcuts.find(sc => sc.id === id);
  if (!s) return;
  document.getElementById('confirm-msg').textContent = `确定要删除 "${s.shortcutKeys} - ${s.description}" 吗？`;
  document.getElementById('confirm-btn').onclick = () => {
    deleteShortcut(id);
    closeConfirm();
  };
  document.getElementById('confirm-dialog').style.display = 'flex';
}

function closeConfirm() {
  document.getElementById('confirm-dialog').style.display = 'none';
}

function deleteShortcut(id) {
  const idx = state.shortcuts.findIndex(s => s.id === id);
  if (idx !== -1) {
    const s = state.shortcuts[idx];
    state.shortcuts.splice(idx, 1);
    saveData();
    renderAll();
    showToast(`已删除 "${s.shortcutKeys}"`, 'success');
  }
}

function openAddAppDialog() {
  const appName = prompt('请输入应用名称：');
  if (appName && appName.trim()) {
    state.selectedApp = appName.trim();
    localStorage.setItem(LAST_APP_KEY, state.selectedApp);
    state.categoryFilter = '全部';
    renderAll();
    openAddModal(appName.trim());
  }
}

/* ===== 导入导出 ===== */
function exportAsJSON() {
  const data = {
    version: 2,
    exportedAt: new Date().toISOString(),
    totalShortcuts: state.shortcuts.length,
    shortcuts: state.shortcuts,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `shortcuts-backup-${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('导出成功', 'success');
}

function importFromJSON() {
  document.getElementById('import-file-input').click();
}

function handleImportFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.shortcuts || !Array.isArray(data.shortcuts)) {
        throw new Error('格式错误');
      }
      state.pendingImport = data.shortcuts;
      // Show preview
      const preview = document.getElementById('import-preview');
      const appCount = new Set(data.shortcuts.map(s => s.appName)).size;
      preview.innerHTML = `
        <p>📦 <strong>${data.shortcuts.length}</strong> 条快捷键，覆盖 <strong>${appCount}</strong> 个应用</p>
        <p style="font-size:12px;color:var(--text-secondary);margin-top:4px;">导出时间: ${data.exportedAt || '未知'}</p>
        <p style="font-size:12px;color:var(--text-secondary);">版本: ${data.version || '未知'}</p>
      `;
      document.querySelector('input[name="import-strategy"][value="merge"]').checked = true;
      document.getElementById('import-modal').style.display = 'flex';
      document.getElementById('btn-import-confirm').onclick = applyImport;
    } catch (err) {
      showToast('文件格式不正确，请选择有效的 .json 文件', 'error');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function applyImport() {
  if (!state.pendingImport) return;
  const strategy = document.querySelector('input[name="import-strategy"]:checked').value;
  const imported = state.pendingImport;

  switch (strategy) {
    case 'replace':
      state.shortcuts = imported;
      break;
    case 'merge':
      const existingIds = new Set(state.shortcuts.map(s => s.id));
      const newItems = imported.filter(s => !existingIds.has(s.id));
      state.shortcuts = [...state.shortcuts, ...newItems];
      break;
    case 'overwrite':
      const idMap = new Map(state.shortcuts.map(s => [s.id, s]));
      imported.forEach(s => { idMap.set(s.id, s); });
      state.shortcuts = Array.from(idMap.values());
      break;
  }

  state.pendingImport = null;
  saveData();
  closeImportModal();
  renderAll();
  showToast('导入成功', 'success');
}

function closeImportModal() {
  document.getElementById('import-modal').style.display = 'none';
  state.pendingImport = null;
}

/* ===== Toast ===== */
function showToast(msg, type) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast toast-' + (type || 'success');
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transition = 'opacity 0.3s ease';
    setTimeout(() => toast.remove(), 300);
  }, 2500);
}

/* ===== 事件绑定 ===== */
const debouncedSearch = debounce(() => {
  state.searchQuery = document.getElementById('search-input').value;
  // If searching and currently in single-app view, switch to all apps
  if (state.searchQuery && state.selectedApp) {
    // Keep selectedApp but app list will filter
  }
  renderAll();
}, 150);

document.getElementById('search-input').addEventListener('input', debouncedSearch);

document.getElementById('category-filter').addEventListener('change', function() {
  state.categoryFilter = this.value;
  renderShortcutList();
});

/* ===== 键盘操作 ===== */
document.addEventListener('keydown', function(e) {
  // Ctrl+F / Cmd+F: focus search
  if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
    e.preventDefault();
    document.getElementById('search-input').focus();
  }
  // Escape: close modals
  if (e.key === 'Escape') {
    if (document.getElementById('modal-overlay').style.display === 'flex') {
      closeModal();
    } else if (document.getElementById('confirm-dialog').style.display === 'flex') {
      closeConfirm();
    } else if (document.getElementById('import-modal').style.display === 'flex') {
      closeImportModal();
    } else {
      document.getElementById('search-input').value = '';
      state.searchQuery = '';
      renderAll();
    }
  }
});

// Close modals on overlay click
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.getElementById('confirm-dialog').addEventListener('click', function(e) {
  if (e.target === this) closeConfirm();
});
document.getElementById('import-modal').addEventListener('click', function(e) {
  if (e.target === this) closeImportModal();
});

/* ===== 初始化 ===== */
(function init() {
  state.shortcuts = loadData();
  const lastApp = localStorage.getItem(LAST_APP_KEY);
  if (lastApp && state.shortcuts.some(s => s.appName === lastApp)) {
    state.selectedApp = lastApp;
  }
  renderAll();
})();
</script>
</body>
</html>
